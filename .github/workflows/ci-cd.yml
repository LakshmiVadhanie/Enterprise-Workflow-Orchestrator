name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  GKE_CLUSTER: workflow-cluster
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Test ─────────────────────────────────────────────────────────────────
  test-workflow-service:
    name: Test Workflow Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Run tests
        working-directory: workflow-service
        run: ./mvnw test

  test-auth-service:
    name: Test Auth Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workflow
          POSTGRES_PASSWORD: test
          POSTGRES_DB: workflow_test
        options: --health-cmd pg_isready
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install & test
        working-directory: auth-service
        run: |
          pip install -r requirements.txt
          python manage.py test
        env:
          DATABASE_URL: postgresql://workflow:test@localhost:5432/workflow_test

  test-dashboard:
    name: Test Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard

  # ─── Build & Push ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-workflow-service, test-auth-service, test-dashboard]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [workflow-service, auth-service, graphql-gateway, bff-server, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io

      - name: Build & push ${{ matrix.service }}
        run: |
          docker build \
            -t gcr.io/$GCP_PROJECT_ID/${{ matrix.service }}:$IMAGE_TAG \
            -t gcr.io/$GCP_PROJECT_ID/${{ matrix.service }}:latest \
            ./${{ matrix.service }}
          docker push gcr.io/$GCP_PROJECT_ID/${{ matrix.service }}:$IMAGE_TAG
          docker push gcr.io/$GCP_PROJECT_ID/${{ matrix.service }}:latest

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.14.0'

      - name: Deploy with Helm (rolling update)
        run: |
          helm upgrade --install workflow-orchestrator \
            ./k8s/helm/workflow-orchestrator \
            --namespace production \
            --create-namespace \
            --set global.imageRegistry=gcr.io/$GCP_PROJECT_ID \
            --set workflowService.image.tag=$IMAGE_TAG \
            --set authService.image.tag=$IMAGE_TAG \
            --set graphqlGateway.image.tag=$IMAGE_TAG \
            --set bffServer.image.tag=$IMAGE_TAG \
            --set dashboard.image.tag=$IMAGE_TAG \
            --set ingress.host=${{ secrets.INGRESS_HOST }} \
            --atomic \
            --timeout 5m \
            --wait

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/workflow-service -n production
          kubectl rollout status deployment/auth-service -n production
          kubectl rollout status deployment/graphql-gateway -n production
          echo "✅ Deployment successful: $IMAGE_TAG"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for $IMAGE_TAG — triggering rollback"
          helm rollback workflow-orchestrator -n production
