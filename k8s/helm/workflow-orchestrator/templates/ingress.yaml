{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workflow-orchestrator-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: workflow-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/graphql
            pathType: Prefix
            backend:
              service:
                name: graphql-gateway
                port:
                  number: 4001
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: bff-server
                port:
                  number: 4000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: bff-server
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 80
{{- end }}
